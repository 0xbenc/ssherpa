# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ssherpa

before:
  hooks:
    - go mod tidy

builds:
  - id: ssherpa
    main: ./cmd/ssherpa
    binary: ssherpa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ssherpa
    ids:
      - ssherpa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*
      - man/*

nfpms:
  - id: ssherpa
    ids:
      - ssherpa
    package_name: ssherpa
    vendor: 0xbenc
    homepage: https://github.com/0xbenc/ssherpa
    maintainer: Ben Chapman <info@offcourtcreations.com>
    description: A terminal UI for the SSH config you already have, with supervised sessions.
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: completions/ssherpa.bash
        dst: /usr/share/bash-completion/completions/ssherpa
      - src: completions/ssherpa.zsh
        dst: /usr/share/zsh/site-functions/_ssherpa
      - src: completions/ssherpa.fish
        dst: /usr/share/fish/vendor_completions.d/ssherpa.fish
      - src: man/ssherpa.1
        dst: /usr/share/man/man1/ssherpa.1

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "ssherpa {{ .Tag }}"
