# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ssherpa

before:
  hooks:
    - go mod tidy

builds:
  - id: ssherpa
    main: ./cmd/ssherpa
    binary: ssherpa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ssherpa
    ids:
      - ssherpa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  disable: true
