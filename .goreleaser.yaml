# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ssherpa

before:
  hooks:
    - go mod verify

builds:
  - id: ssherpa
    main: ./cmd/ssherpa
    binary: ssherpa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: ssherpa
    ids:
      - ssherpa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
      - man/*

nfpms:
  - id: ssherpa
    ids:
      - ssherpa
    package_name: ssherpa
    vendor: 0xbenc
    homepage: https://github.com/0xbenc/ssherpa
    maintainer: Ben Chapman <info@offcourtcreations.com>
    description: A terminal UI for the SSH config you already have, with supervised sessions.
    license: MIT
    formats:
      - deb
      - rpm
    overrides:
      deb:
        dependencies:
          - openssh-client
      rpm:
        dependencies:
          - openssh-clients
    contents:
      - src: LICENSE
        dst: /usr/share/doc/ssherpa/LICENSE
      - src: completions/ssherpa.bash
        dst: /usr/share/bash-completion/completions/ssherpa
      - src: completions/ssherpa.zsh
        dst: /usr/share/zsh/site-functions/_ssherpa
      - src: completions/ssherpa.fish
        dst: /usr/share/fish/vendor_completions.d/ssherpa.fish
      - src: man/ssherpa.1
        dst: /usr/share/man/man1/ssherpa.1

homebrew_casks:
  - name: ssherpa
    ids:
      - ssherpa
    binaries:
      - ssherpa
    manpages:
      - man/ssherpa.1
    completions:
      bash: completions/ssherpa.bash
      zsh: completions/ssherpa.zsh
      fish: completions/ssherpa.fish
    homepage: https://github.com/0xbenc/ssherpa
    description: A terminal UI for the SSH config you already have, with supervised sessions.
    repository:
      owner: 0xbenc
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@users.noreply.github.com

checksum:
  name_template: checksums.txt

# Requires syft on PATH at release time; release.yml installs it via
# anchore/sbom-action/download-syft before running goreleaser.
sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "ssherpa {{ .Tag }}"
