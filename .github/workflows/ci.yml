name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly heartbeat so govulncheck surfaces new CVEs without commits.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'gofmt needed:\n%s\n' "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Smoke test version command
        run: go run ./cmd/ssherpa version

      - name: Smoke test inventory JSON
        run: go run ./cmd/ssherpa list --json --config internal/sshconfig/testdata/matrix/config

      - name: Smoke test print mode
        run: go run ./cmd/ssherpa --print --select prod --config internal/sshconfig/testdata/matrix/config -- -L 8080:localhost:8080

      - name: Smoke test jump and proxy
        run: |
          go run ./cmd/ssherpa jump --dest prod --hop quoted --print --config internal/sshconfig/testdata/matrix/config -- -A
          go run ./cmd/ssherpa proxy --select prod --port 1080 --print --config internal/sshconfig/testdata/matrix/config

      - name: Smoke test config mutation
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          cfg="$tmp/config"
          printf 'Host old\n  HostName old.example.com\n' > "$cfg"
          go run ./cmd/ssherpa add --alias prod --host prod.example.com --config "$cfg" --dry-run
          go run ./cmd/ssherpa add --alias prod --host prod.example.com --config "$cfg" --yes
          go run ./cmd/ssherpa edit set prod --user alice --config "$cfg" --yes
          go run ./cmd/ssherpa edit delete prod --config "$cfg" --dry-run
          go run ./cmd/ssherpa edit delete-all --config "$cfg" --dry-run

      - name: Smoke test authorized_keys mutation
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          auth="$tmp/authorized_keys"
          keys="$tmp/keys"
          mkdir -p "$keys"
          ed='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDb7Ccg8MuAtwJl6bsEjuCHWDtiRtivD3c1vzgbG7N1q alice@example'
          ecdsa='ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBDxfAByeMchlvCAqslVGYuzLS4lr02wvFIn2rz4Jp40NrbYkbazkdAtflVPDCCewMSI2I0ujG0JJeZEjYarX8sI= ecdsa@example'
          printf '%s\n' "$ecdsa" > "$keys/ecdsa.pub"
          go run ./cmd/ssherpa authkeys add --key "$ed" --path "$auth" --yes
          go run ./cmd/ssherpa authkeys list --json --path "$auth"
          go run ./cmd/ssherpa authkeys merge --from-dir "$keys" --path "$auth" --dry-run
          go run ./cmd/ssherpa authkeys delete --fingerprint SHA256:HIw5mTiqXNXNO2h1Vh9R81VrAaKPj4DqNvb3oWElxwk --path "$auth" --yes

      - name: Smoke test supervised sessions
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          {
            printf '%s\n' '#!/bin/sh'
            printf '%s\n' 'printf "fake supervised ssh: %s\n" "$*"'
            printf '%s\n' 'exit 0'
          } > "$tmp/fake-ssh"
          chmod +x "$tmp/fake-ssh"
          go run ./cmd/ssherpa --state-dir "$tmp/state" --ssh-binary "$tmp/fake-ssh" --select prod --config internal/sshconfig/testdata/matrix/config
          go run ./cmd/ssherpa session list --json --state-dir "$tmp/state"
          go run ./cmd/ssherpa session map --state-dir "$tmp/state"

      - name: Build native binary
        run: go build -trimpath -o ssherpa ./cmd/ssherpa

  cross-build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/ssherpa_${GOOS}_${GOARCH}" ./cmd/ssherpa

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  goreleaser-check:
    name: goreleaser check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check

  conformance:
    name: tui-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Shared-UI drift guards
        shell: bash
        run: |
          fail=0
          # Footers must flow through chrome.Footer — no hand-built " / " drift.
          if grep -rn '  /  ' internal; then
            echo "::error::hand-built '  /  ' footer separator — use chrome.Footer([]chrome.KeyHint{...})"; fail=1
          fi
          # Spinners must use termchrome.ResolveGlyphs — no inline frame runes.
          if grep -rnE "\[\]rune\{'\|'" internal cmd; then
            echo "::error::inline spinner frames — use termchrome.ResolveGlyphs"; fail=1
          fi
          # No golden-update flag is supported (inline-literal model).
          if grep -rnE 'UPDATE_GOLDEN|flag\.[A-Za-z]+\("update"' internal; then
            echo "::error::no golden-update flag is supported; hand-edit inline expectations"; fail=1
          fi
          # Interaction contract pointer must keep the canonical passage URL.
          if ! grep -q 'github.com/0xbenc/passage/blob/main/docs/flow-contract.md' docs/flow-contract.md; then
            echo "::error::docs/flow-contract.md must point at the canonical passage contract"; fail=1
          fi
          # No replace directive in the released module graph.
          if grep -qE '^replace ' go.mod; then
            echo "::error::replace directive in go.mod — pin tagged shared-module versions"; fail=1
          fi
          if [ "$fail" = 0 ]; then echo "conformance OK"; fi
          exit $fail
